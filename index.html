<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKD eGFR Calculator</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">

<style>
    body {
        font-family: Segoe UI, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
    }
    .container {
        max-width: 360px;
        margin: auto;
        background: white;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        box-shadow: 0 0 8px rgba(0,0,0,0.08);
    }
    h2 {
        text-align: center;
        margin-bottom: 12px;
        font-size: 1.3em;
    }
    label {
        font-size: 1em;
        margin-top: 6px;
        display: block;
    }
    input {
        width: 100%;
        padding: 8px;
        font-size: 1em;
        margin-top: 4px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }
    button {
        padding: 8px 14px;
        font-size: 1em;
        margin: 6px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    .btn-primary {
        background: #0078d4;
        color: white;
    }
    .btn-secondary {
        background: #666;
        color: white;
    }
    #result {
        margin-top: 10px;
        padding: 10px;
        background: #eef;
        border-radius: 6px;
        min-height: 50px;
        white-space: pre-line;
        font-size: 1em;
    }
</style>
</head>

<body>

<div class="container">
    <h2>🩺 CKD eGFR Calculator</h2>

    <label>Enter eGFR (optional):</label>
    <input type="number" id="egfr" inputmode="decimal">

    <label>OR Creatinine (µmol/L):</label>
    <input type="number" id="creat" inputmode="decimal">

    <label>Age (years):</label>
    <input type="number" id="age" inputmode="numeric">

    <label>Sex (M/F):</label>
    <input type="text" id="sex" maxlength="1">

    <div style="text-align:center;">
        <button class="btn-primary" onclick="calculate()">Calculate</button>
        <button class="btn-secondary" onclick="resetFields()">Reset</button>
    </div>

    <div id="result"></div>
</div>

<script>
// ---- CKD‑EPI 2021 Creatinine Equation ----
function ckd_epi_2021_creatinine(serum_creat_umol_l, age, sex) {
    let scr_mg_dl = serum_creat_umol_l / 88.4;

    let k, alpha, sex_factor;
    if (sex === "F") {
        k = 0.7;
        alpha = -0.241;
        sex_factor = 1.012;
    } else {
        k = 0.9;
        alpha = -0.302;
        sex_factor = 1.0;
    }

    let min_scr_k = Math.min(scr_mg_dl / k, 1);
    let max_scr_k = Math.max(scr_mg_dl / k, 1);

    let egfr = 142 *
        Math.pow(min_scr_k, alpha) *
        Math.pow(max_scr_k, -1.200) *
        Math.pow(0.9938, age) *
        sex_factor;

    return egfr;
}

// ---- CKD Staging ----
function ckd_stage_from_egfr(egfr) {
    if (egfr >= 90) return "Stage 1 (≥90; needs kidney damage evidence)";
    if (egfr >= 60) return "Stage 2 (60–89; needs kidney damage evidence)";
    if (egfr >= 45) return "Stage 3a (45–59)";
    if (egfr >= 30) return "Stage 3b (30–44)";
    if (egfr >= 15) return "Stage 4 (15–29)";
    return "Stage 5 (<15; kidney failure)";
}

// ---- Calculate ----
function calculate() {
    let egfrInput = document.getElementById("egfr").value.trim();
    let creat = document.getElementById("creat").value.trim();
    let age = document.getElementById("age").value.trim();
    let sex = document.getElementById("sex").value.trim().toUpperCase();

    let egfr;

    try {
        if (egfrInput) {
            egfr = parseFloat(egfrInput);
        } else {
            if (!creat || !age || !sex) {
                alert("Please enter creatinine, age, and sex.");
                return;
            }
            if (sex !== "M" && sex !== "F") {
                alert("Sex must be M or F.");
                return;
            }
            egfr = ckd_epi_2021_creatinine(parseFloat(creat), parseInt(age), sex);
        }

        let stage = ckd_stage_from_egfr(egfr);

        document.getElementById("result").textContent =
            "eGFR: " + egfr.toFixed(1) + " mL/min/1.73m²\n" +
            "CKD Stage: " + stage;

    } catch (e) {
        alert("Please enter valid numeric values.");
    }
}

// ---- Reset ----
function resetFields() {
    document.getElementById("egfr").value = "";
    document.getElementById("creat").value = "";
    document.getElementById("age").value = "";
    document.getElementById("sex").value = "";
    document.getElementById("result").textContent = "";
}

// ---- Enter‑key navigation ----
document.getElementById("creat").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("age").focus();
});
document.getElementById("age").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("sex").focus();
});
document.getElementById("sex").addEventListener("keydown", e => {
    if (e.key === "Enter") calculate();
});

// ---- Register service worker ----
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
